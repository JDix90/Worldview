# ORRERY stack. `docker compose up -d` runs the always-on pipeline (postgres,
# redis, worker, server) detached from any terminal — collection must survive
# logouts and reboots (Docker Desktop restarts these if it launches at login).
# The web client stays host-run: `pnpm dev:web` when you want to look.
# Host ports default to 5435/6380/8787 to avoid colliding with other stacks.
# Dev iteration: `docker compose up -d --build worker server` after code edits,
# or stop a container and run its pnpm dev script on the host instead.
name: orrery

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orrery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orrery_local}
      POSTGRES_DB: ${POSTGRES_DB:-orrery}
    ports:
      # loopback-only: the DB is reachable from the host for tooling, never
      # from other interfaces (FOUNDATION §1 no-public-exposure; container↔
      # container traffic uses the internal network, unaffected)
      - "127.0.0.1:${POSTGRES_PORT:-5435}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orrery} -d ${POSTGRES_DB:-orrery}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # loopback-only (see postgres above)
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build: .
    restart: unless-stopped
    command: pnpm --filter @orrery/worker exec tsx src/index.ts
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-orrery}:${POSTGRES_PASSWORD:-orrery_local}@postgres:5432/${POSTGRES_DB:-orrery}
      RAW_DATA_DIR: /app/data/raw
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  server:
    build: .
    restart: unless-stopped
    command: pnpm --filter @orrery/server exec tsx src/index.ts
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-orrery}:${POSTGRES_PASSWORD:-orrery_local}@postgres:5432/${POSTGRES_DB:-orrery}
      ORRERY_SERVER_HOST: 0.0.0.0
    ports:
      # Host bind defaults to loopback (Mac-local, FOUNDATION §1). On the Pi 5
      # appliance set ORRERY_BIND_HOST=0.0.0.0 to reach it from the LAN — auth
      # is unchanged static-token; keep it behind the household firewall, never
      # port-forwarded. Postgres/Redis stay loopback-only regardless.
      - "${ORRERY_BIND_HOST:-127.0.0.1}:${ORRERY_SERVER_PORT:-8787}:8787"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
